<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Halloween Puzzle Game</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
body { 
    background: linear-gradient(135deg, #1a1a1a 0%, #2d1b00 100%); 
    color: #fff; 
    font-family: 'Segoe UI', sans-serif; 
    margin: 0; 
    padding: 0; 
    min-height: 100vh;
}
.container { 
    max-width: 800px; 
    margin: 40px auto; 
    background: linear-gradient(135deg, #2b2b2b 0%, #1a1a1a 100%);
    padding: 30px; 
    border-radius: 16px; 
    box-shadow: 0 8px 32px rgba(255, 140, 0, 0.3);
    border: 2px solid rgba(255, 140, 0, 0.2);
}
h1 { 
    text-align: center; 
    font-size: 2.5rem; 
    margin-bottom: 20px; 
    color: #ff8c00;
    text-shadow: 0 0 20px rgba(255, 140, 0, 0.5);
    animation: glow 2s ease-in-out infinite alternate;
}
@keyframes glow {
    from { text-shadow: 0 0 10px rgba(255, 140, 0, 0.5); }
    to { text-shadow: 0 0 25px rgba(255, 140, 0, 0.8), 0 0 35px rgba(255, 140, 0, 0.5); }
}
#progressBar { 
    background: #555; 
    border-radius: 10px; 
    overflow: hidden; 
    height: 25px; 
    margin-bottom: 20px;
    border: 2px solid #777;
}
#progressFill { 
    background: linear-gradient(90deg, #ff8c00, #ff6b00); 
    height: 100%; 
    width: 0%; 
    transition: width 0.5s ease;
    box-shadow: 0 0 10px rgba(255, 140, 0, 0.6);
}
.levelInfo {
    text-align: center;
    font-size: 1.1rem;
    color: #ffa500;
    margin-bottom: 15px;
    font-weight: bold;
}
.answerContainer { 
    display: flex; 
    gap: 5px; 
    justify-content: center; 
    flex-wrap: wrap; 
    margin-bottom: 25px;
    min-height: 60px;
}
.answerSlot { 
    width: 50px; 
    height: 50px; 
    text-align: center;
    font-size: 1.3rem;
    font-weight: bold;
    border-radius: 8px; 
    border: 2px dashed #666;
    background: #444;
    color: #fff;
}
.answerSlot.correct { 
    background: linear-gradient(135deg, #4CAF50, #45a049); 
    border: 2px solid #4CAF50;
    color: #fff;
}
#hint { 
    text-align: center; 
    margin-bottom: 20px; 
    color: #ffd700;
    font-size: 1.3rem;
    font-weight: 600;
    padding: 15px;
    background: rgba(255, 215, 0, 0.1);
    border-radius: 10px;
    border: 1px solid rgba(255, 215, 0, 0.3);
}
#timer { 
    text-align: center; 
    margin-bottom: 25px;
    font-size: 1.4rem;
    font-weight: bold;
    color: #ff6b6b;
    text-shadow: 0 0 10px rgba(255, 107, 107, 0.5);
}
#rewardBtn { 
    display: none; 
    margin: 20px auto; 
    padding: 15px 40px; 
    background: linear-gradient(135deg, #ff8c00, #ff6b00);
    color: #000; 
    font-weight: bold; 
    border: none; 
    border-radius: 10px; 
    cursor: pointer; 
    font-size: 1.4rem;
    box-shadow: 0 4px 15px rgba(255, 140, 0, 0.4);
    transition: all 0.3s;
}
#rewardBtn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(255, 140, 0, 0.6);
}
#rewardBtn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}
.message {
    text-align: center;
    padding: 15px;
    margin: 20px 0;
    border-radius: 10px;
    font-weight: 600;
}
.message.success {
    background: rgba(76, 175, 80, 0.2);
    color: #4CAF50;
    border: 1px solid #4CAF50;
}
.message.error {
    background: rgba(244, 67, 54, 0.2);
    color: #f44336;
    border: 1px solid #f44336;
}
.message.info {
    background: rgba(33, 150, 243, 0.2);
    color: #2196F3;
    border: 1px solid #2196F3;
}
.controls {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-top: 20px;
}
.btn {
    padding: 10px 20px;
    border-radius: 8px;
    border: none;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.3s;
}
.btn-secondary {
    background: #555;
    color: #fff;
}
.btn-secondary:hover {
    background: #666;
}
</style>
</head>
<body>

<div class="container">
    <h1>🎃 Halloween Puzzle Game</h1>
    <div id="progressBar"><div id="progressFill"></div></div>
    <div class="levelInfo" id="levelInfo"></div>
    <div id="hint"></div>
    <div id="timer"></div>
    <div id="message" class="message" style="display:none;"></div>
    <div class="answerContainer" id="answerContainer"></div>
    <div class="controls">
        <button class="btn btn-secondary" id="resetBtn" style="display:none;">🔄 Làm lại level</button>
    </div>
    <button id="rewardBtn">🎁 Nhận Phần Thưởng</button>
</div>

<script>
const levels = [
    { code: 'HALLOWEEN', hint: '🎃 Tên của lễ hội kinh dị vào ngày 31/10' },
    { code: 'SHOPPNGUYENROBLOX', hint: 'Đây là biểu tượng Shop của chúng tôi' },
    { code: 'PNGUYENROBLOXCHUCMUNGNGAYHALLOWEEN', hint: 'Tên shop - lời chúc lễ hội' },
    { code: 'DICHVUROBLOXUYTIN-GIARE', hint: 'Dịch vụ uy tín, giá rẻ' },
    { code: 'SUKIENEVENTHALLOWEENGIAITHUONGTU1K-500K', hint: 'Bắt đầu bằng "Sự kiện Event", kết thúc "giải thưởng"' }
];

let currentLevel = 0;
let timeLeft = 600;
let timerInterval = null;
const API_BASE = 'https://pnguyenroblox.onrender.com/api/halloween';

// Elements
const progressFill = document.getElementById('progressFill');
const levelInfo = document.getElementById('levelInfo');
const hintEl = document.getElementById('hint');
const answerContainer = document.getElementById('answerContainer');
const timerEl = document.getElementById('timer');
const messageEl = document.getElementById('message');
const rewardBtn = document.getElementById('rewardBtn');
const resetBtn = document.getElementById('resetBtn');

function showMessage(text, type='info'){
    messageEl.textContent=text;
    messageEl.className=`message ${type}`;
    messageEl.style.display='block';
    setTimeout(()=>messageEl.style.display='none',3000);
}

function updateProgress(){
    progressFill.style.width=((currentLevel)/levels.length*100)+'%';
    levelInfo.textContent=`Level ${currentLevel+1} / ${levels.length}`;
}

// Render input-based level
function renderLevel(){
    if(currentLevel>=levels.length){ completeGame(); return; }
    const level=levels[currentLevel];
    hintEl.textContent=level.hint;
    updateProgress();

    answerContainer.innerHTML='';
    level.code.split('').forEach((c,i)=>{
        const input=document.createElement('input');
        input.type='text';
        input.maxLength=1;
        input.className='answerSlot';
        input.dataset.index=i;
        input.addEventListener('input', checkLevelComplete);
        answerContainer.appendChild(input);
    });
    resetBtn.style.display='inline-block';
}

function checkLevelComplete(){
    const inputs=[...answerContainer.querySelectorAll('input')];
    const code=levels[currentLevel].code;
    let correct=true;
    for(let i=0;i<code.length;i++){
        if(inputs[i].value.toUpperCase()!==code[i]){
            correct=false;
            inputs[i].classList.remove('correct');
        } else inputs[i].classList.add('correct');
    }
    if(correct){
        showMessage('🎉 Chính xác! Tiến sang level tiếp theo...','success');
        try{
            const token=localStorage.getItem('token');
            if(token) fetch(`${API_BASE}/complete-level`,{
                method:'POST',
                headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},
                body:JSON.stringify({level:currentLevel+1})
            });
        }catch(e){ console.error(e); }
        setTimeout(()=>{ currentLevel++; renderLevel(); },1500);
    }
}

function completeGame(){
    hintEl.textContent='🎊 Chúc mừng! Hoàn thành tất cả level!';
    answerContainer.innerHTML='';
    rewardBtn.style.display='block';
    resetBtn.style.display='none';
    progressFill.style.width='100%';
    levelInfo.textContent='Hoàn thành!';
    if(timerInterval) clearInterval(timerInterval);
}

// Timer
function startTimer(){
    if(timerInterval) clearInterval(timerInterval);
    timerInterval=setInterval(()=>{
        if(timeLeft<=0){
            clearInterval(timerInterval);
            timerEl.textContent='⏰ Hết thời gian!';
            showMessage('Thời gian đã hết! Làm lại.','error');
            renderLevel();
            return;
        }
        let m=Math.floor(timeLeft/60),s=timeLeft%60;
        timerEl.textContent=`⏱️ Thời gian: ${m}:${s<10?'0'+s:s}`;
        timeLeft--;
    },1000);
}

// Reset
resetBtn.addEventListener('click', ()=>{ renderLevel(); showMessage('Đã làm mới level hiện tại','info'); });

// Reward
rewardBtn.addEventListener('click', async ()=>{
    const token=localStorage.getItem('token'); 
    if(!token){ showMessage('⚠️ Bạn cần đăng nhập','error'); return; }
    rewardBtn.disabled=true;
    showMessage('Đang xử lý...','info');
    try{
        const res=await fetch(`${API_BASE}/reward`,{
            method:'POST',
            headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'}
        });
        const data=await res.json();
        if(data.success){ 
            showMessage(`🎉 Nhận ${data.amount.toLocaleString()}đ`,'success'); 
            rewardBtn.textContent='✅ Đã nhận'; 
        }
        else{ showMessage(`❌ ${data.error}`,'error'); rewardBtn.disabled=false; }
    }catch(e){ console.error(e); showMessage('❌ Lỗi kết nối server','error'); rewardBtn.disabled=false; }
});

// Init
async function initGame(){
    const token=localStorage.getItem('token');
    if(!token){ showMessage('⚠️ Vui lòng đăng nhập để chơi','error'); }
    try{
        const res=await fetch(`${API_BASE}/status`,{headers:{'Authorization':'Bearer '+token}});
        const data=await res.json();
        if(data.rewardClaimed){ hintEl.textContent='✅ Bạn đã nhận thưởng!'; answerContainer.innerHTML=''; progressFill.style.width='100%'; levelInfo.textContent='Đã hoàn thành'; timerEl.textContent='🎉 Cảm ơn!'; return; }
        if(data.completed){ currentLevel=levels.length; completeGame(); return; }
        if(data.level>0){ currentLevel=data.level; showMessage(`Tiếp tục từ level ${currentLevel+1}`,'info'); }
        renderLevel();
        startTimer();
    }catch(e){ console.error(e); showMessage('❌ Lỗi server, chơi offline','error'); renderLevel(); startTimer(); }
}

initGame();
</script>
</body>
</html>
